keys:
  - &cyprus 
  - &galzburg 
  - &chelyabinsk 
# 量子计算机比我预期的要近，现在就得开始迁移到后量子加密方案了
creation_rules:
  - path_regex: secrets/hosts/chelyabinsk(/.*)?\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *chelyabinsk
  - path_regex: secrets/hosts/galzburg(/.*)?\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *galzburg

  - path_regex: .*\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *cyprus
          - *galzburg
          - *chelyabinsk
    # 冷知识普及时间，yml 这种后现代缩写主要是为了兼容某个最长只能有三位扩展名的老登系统。
    # 所以，未来只会考虑 yaml 扩展名。
